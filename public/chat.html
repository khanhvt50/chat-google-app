<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    #chat {
      flex:1;
      overflow-y:auto;
      padding:20px;
    }

    .msg {
      margin:10px 0;
    }

    #inputBox {
      display:flex;
      padding:10px;
      background:#1e293b;
    }

    input {
      flex:1;
      padding:10px;
      border-radius:6px;
      border:none;
    }

    button {
      margin-left:10px;
      padding:10px;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Nhập tin nhắn..." />
  <button onclick="send()">Gửi</button>
</div>

<script>
const socket = io();

function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  if (!text) return;

  socket.emit("send_message", text);
  input.value = "";
}

socket.on("receive_message", (data) => {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = data.user + ": " + data.text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>
